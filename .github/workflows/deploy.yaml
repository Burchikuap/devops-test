name: Deploy

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    env:
      NAMESPACE: devops-platform
      JWT_SECRET: change-me-dev-secret
      JWT_AUDIENCE: devops-clients
      JWT_ISSUER: devops-test-suite
      IMAGE_TAG: ci-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/api/requirements.txt
          python -m pip install -r services/worker/requirements.txt

      - name: Run API unit tests
        working-directory: services/api
        run: python -m pytest tests

      - name: Run worker unit tests
        working-directory: services/worker
        run: python -m pytest tests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t local/api-gateway:${IMAGE_TAG} services/api

      - name: Build worker image
        run: docker build -t local/task-worker:${IMAGE_TAG} services/worker

      - name: Scan API image
        run: |
          docker save -o /tmp/api-image.tar local/api-gateway:${IMAGE_TAG}
          docker run --rm -v /tmp:/tmp aquasec/trivy:0.68.1 image \
            --input /tmp/api-image.tar \
            --severity HIGH,CRITICAL \
            --exit-code 1

      - name: Scan worker image
        run: |
          docker save -o /tmp/worker-image.tar local/task-worker:${IMAGE_TAG}
          docker run --rm -v /tmp:/tmp aquasec/trivy:0.68.1 image \
            --input /tmp/worker-image.tar \
            --severity HIGH,CRITICAL \
            --exit-code 1

      - name: Install kind
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: devops-test

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Load local images into kind
        run: |
          kind load docker-image local/api-gateway:${IMAGE_TAG} --name devops-test
          kind load docker-image local/task-worker:${IMAGE_TAG} --name devops-test

      - name: Add monitoring repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Install platform dependencies
        run: |
          helm upgrade --install platform infra/helm/platform --create-namespace --namespace ${NAMESPACE}
          helm upgrade --install rabbitmq infra/helm/rabbitmq --namespace ${NAMESPACE}
          helm upgrade --install valkey infra/helm/valkey --namespace ${NAMESPACE}
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring --create-namespace -f monitoring/kube-prometheus-stack-values.yaml
          helm upgrade --install loki grafana/loki \
            --namespace monitoring -f monitoring/loki-values.yaml

      - name: Deploy workloads
        run: |
          helm upgrade --install api infra/helm/api \
            --namespace ${NAMESPACE} \
            --set image.repository=local/api-gateway \
            --set image.tag=${IMAGE_TAG}
          helm upgrade --install worker infra/helm/worker \
            --namespace ${NAMESPACE} \
            --set image.repository=local/task-worker \
            --set image.tag=${IMAGE_TAG}

      - name: Wait for rollout
        run: |
          kubectl rollout status statefulset/rabbitmq -n ${NAMESPACE} --timeout=240s
          kubectl rollout status statefulset/valkey -n ${NAMESPACE} --timeout=240s
          kubectl rollout status deployment/api -n ${NAMESPACE} --timeout=240s
          kubectl rollout status deployment/worker -n ${NAMESPACE} --timeout=240s

      - name: Smoke test
        run: bash infra/scripts/smoke.sh
