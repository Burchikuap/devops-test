apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: worker
spec:
  selector:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: worker
  ports:
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics

