nameOverride: api

image:
  repository: local/api-gateway
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  name: api
  port: 8000

config:
  serviceName: api
  rabbitmqHost: rabbitmq
  rabbitmqPort: "5672"
  rabbitmqQueue: task-queue
  valkeyHost: valkey
  valkeyPort: "6379"
  jwtAlgorithm: HS256
  jwtAudience: devops-clients
  jwtIssuer: devops-test-suite
  resultKeyPrefix: task-result
  processedCounterKey: worker:processed_total
  resultTtlSeconds: "86400"

secrets:
  jwtSecret: change-me-dev-secret
  rabbitmqUsername: app
  rabbitmqPassword: change-me-rabbitmq
  valkeyPassword: change-me-valkey

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

hpa:
  minReplicas: 2
  maxReplicas: 5
  cpuUtilization: 70

pdb:
  minAvailable: 1

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack

