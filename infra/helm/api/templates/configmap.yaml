apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api
data:
  SERVICE_NAME: {{ .Values.config.serviceName | quote }}
  HOST: "0.0.0.0"
  PORT: {{ .Values.service.port | quote }}
  RABBITMQ_HOST: {{ .Values.config.rabbitmqHost | quote }}
  RABBITMQ_PORT: {{ .Values.config.rabbitmqPort | quote }}
  RABBITMQ_QUEUE: {{ .Values.config.rabbitmqQueue | quote }}
  VALKEY_HOST: {{ .Values.config.valkeyHost | quote }}
  VALKEY_PORT: {{ .Values.config.valkeyPort | quote }}
  JWT_ALGORITHM: {{ .Values.config.jwtAlgorithm | quote }}
  JWT_AUDIENCE: {{ .Values.config.jwtAudience | quote }}
  JWT_ISSUER: {{ .Values.config.jwtIssuer | quote }}
  RESULT_KEY_PREFIX: {{ .Values.config.resultKeyPrefix | quote }}
  PROCESSED_COUNTER_KEY: {{ .Values.config.processedCounterKey | quote }}
  RESULT_TTL_SECONDS: {{ .Values.config.resultTtlSeconds | quote }}

